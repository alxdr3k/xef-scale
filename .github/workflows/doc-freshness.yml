name: Doc Freshness

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute changed paths vs base
        id: diff
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          {
            echo "changed<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect doc-touching code changes
        id: detect
        env:
          CHANGED: ${{ steps.diff.outputs.changed }}
        run: |
          set -euo pipefail
          missing=()

          touched_runtime_code=$(printf '%s\n' "$CHANGED" | grep -E '^app/' | grep -Ev '^app/models/' || true)
          touched_ai_code=$(printf '%s\n' "$CHANGED" | grep -E '^app/(parsers|prompts)/|^app/services/(ai_|gemini_|image_statement_parser)|^app/jobs/(ai_|file_parsing_job|.*parsing_job)\.rb$' || true)
          touched_models=$(printf '%s\n' "$CHANGED" | grep -E '^app/models/' || true)
          touched_routes=$(printf '%s\n' "$CHANGED" | grep -E '^config/routes\.rb$' || true)
          touched_migrations=$(printf '%s\n' "$CHANGED" | grep -E '^db/migrate/' || true)
          touched_schema=$(printf '%s\n' "$CHANGED" | grep -E '^db/schema\.rb$' || true)

          touched_runtime_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/(context/current-state|02_HLD)\.md$|^docs/current/(RUNTIME|CODE_MAP)\.md$' || true)
          touched_data_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/current/DATA_MODEL\.md$' || true)
          touched_ai_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/current/(AI_PIPELINE|CATEGORIZATION)\.md$' || true)
          touched_roadmap_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/04_IMPLEMENTATION_PLAN\.md$' || true)
          touched_acceptance_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/06_ACCEPTANCE_TESTS\.md$' || true)
          touched_generated_routes=$(printf '%s\n' "$CHANGED" | grep -E '^docs/generated/routes\.md$' || true)
          touched_generated_schema=$(printf '%s\n' "$CHANGED" | grep -E '^docs/generated/schema\.md$' || true)
          touched_decisions=$(printf '%s\n' "$CHANGED" | grep -E '^docs/(decisions/|08_DECISION_REGISTER\.md)' || true)

          if [ -n "$touched_runtime_code" ] &&
             [ -z "$touched_runtime_doc" ] &&
             [ -z "$touched_roadmap_doc" ] &&
             [ -z "$touched_acceptance_doc" ] &&
             [ -z "$touched_decisions" ]; then
            missing+=("app/ 변경 감지 → 구현 동작은 \`docs/current/RUNTIME.md\` / \`docs/current/CODE_MAP.md\`, active position은 \`docs/context/current-state.md\`, slice/evidence는 \`docs/04_IMPLEMENTATION_PLAN.md\`, gate 변경은 \`docs/06_ACCEPTANCE_TESTS.md\` 중 필요한 문서를 같은 PR에서 갱신 (또는 ADR 추가).")
          fi

          if [ -n "$touched_ai_code" ] && [ -z "$touched_ai_doc" ] && [ -z "$touched_decisions" ]; then
            missing+=("AI/parser/job 코드 변경 감지 → \`docs/current/AI_PIPELINE.md\` 또는 \`docs/current/CATEGORIZATION.md\`의 SHA 헤더와 본문을 갱신 (또는 ADR 추가).")
          fi

          if [ -n "$touched_models" ] && [ -z "$touched_data_doc" ] && [ -z "$touched_decisions" ]; then
            missing+=("app/models/ 변경 감지 → \`docs/current/DATA_MODEL.md\` 갱신 (또는 ADR 추가).")
          fi

          if [ -n "$touched_routes" ] && [ -z "$touched_generated_routes" ]; then
            missing+=("\`config/routes.rb\` 변경 감지 → \`bin/rake docs:generate:routes\`로 \`docs/generated/routes.md\` 재생성.")
          fi

          if { [ -n "$touched_migrations" ] || [ -n "$touched_schema" ]; } && { [ -z "$touched_data_doc" ] || [ -z "$touched_generated_schema" ]; } && [ -z "$touched_decisions" ]; then
            missing+=("DB 마이그레이션/스키마 변경 감지 → \`docs/current/DATA_MODEL.md\` 갱신 + \`bin/rake docs:generate:schema\` (또는 ADR 추가).")
          fi

          if [ ${#missing[@]} -eq 0 ]; then
            echo "missing=" >> "$GITHUB_OUTPUT"
          else
            {
              echo "missing<<EOF"
              for m in "${missing[@]}"; do
                echo "- $m"
              done
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Update doc freshness comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          MISSING: ${{ steps.detect.outputs.missing }}
        with:
          script: |
            const missing = process.env.MISSING || '';
            const marker = '<!-- doc-freshness-check -->';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (!missing.trim()) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const body = [
              marker,
              '### Doc freshness check',
              '',
              '코드 변경이 roadmap/status, acceptance gate, canonical current docs, generated docs, 또는 ADR을 건드려야 할 수 있습니다.',
              missing,
              '',
              '정책: `docs/DOCUMENTATION.md`. 이 코멘트는 자동입니다. 의도한 변경이라면 PR template의 "No doc impact" 체크 + 사유로 답하세요.',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
