# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  # ADR-0002: purge ActiveStorage blobs whose parsing session has been in a
  # terminal state for >= 180 days. Runs once a day at 03:00 KST — off-peak,
  # and the daily cadence means a failed run is automatically retried the next
  # day rather than needing per-run retry logic.
  cleanup_active_storage_blobs:
    class: ActiveStorageBlobCleanupJob
    queue: default
    schedule: every day at 3am
