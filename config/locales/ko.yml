# Korean translations.
#
# 본 파일은 ADR-0007 §4 인라인 학습 제안 카피로 시작했고, Phase 6 (ui-redesign-plan §6)
# 부터 전체 한글 카피의 단일 출처가 된다. 사전 정의는 `docs/discovery/
# 2026-05-15-design-system-synthesis.md` 8장 (UX Writing).
#
# 보이스 규칙 (synthesis 8.7):
#   1. 기능명 금지 — 사용자 향 카피에 "Transaction"/"Review"/"Mapping" 등 시스템 어휘 X
#   2. 존댓말 통일 — "-요/-어요" 종결
#   3. 워크스페이스 컨텍스트 — "당신" 대신 "%{workspace}", "이번 달"
#   4. AI 단정 어조 금지 — "추천했어요", "추측이에요"
#   5. 위험 행동은 영향 범위 명시 — N건/멤버 영향/비가역 여부
#   6. 게이미피케이션 어휘 금지 — "X% 완성" 같은 진행형 X
