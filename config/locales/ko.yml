# Korean translations.
#
# 본 파일은 ADR-0007 §4 인라인 학습 제안 카피로 시작했고, Phase 6 (ui-redesign-plan §6)
# 부터 전체 한글 카피의 단일 출처가 된다. 사전 정의는 `docs/discovery/
# 2026-05-15-design-system-synthesis.md` 8장 (UX Writing).
#
# 보이스 규칙 (synthesis 8.7):
#   1. 기능명 금지 — 사용자 향 카피에 "Transaction"/"Review"/"Mapping" 등 시스템 어휘 X
#   2. 존댓말 통일 — "-요/-어요" 종결
#   3. 워크스페이스 컨텍스트 — "당신" 대신 "%{workspace}", "이번 달"
#   4. AI 단정 어조 금지 — "추천했어요", "추측이에요"
#   5. 위험 행동은 영향 범위 명시 — N건/멤버 영향/비가역 여부
#   6. 게이미피케이션 어휘 금지 — "X% 완성" 같은 진행형 X
ko:
  # ──────────────────────────────────────────────────
  # 5탭 IA (ADR-0004) + 공통 nav
  # ──────────────────────────────────────────────────
  app:
    name: "지출 추적"

  nav:
    home: "홈"
    transactions: "거래"
    reviews: "검토함"
    categories: "카테고리"
    more: "더보기"
    workspaces: "워크스페이스"
    workspace_settings: "워크스페이스 설정"
    account_settings: "계정 설정"
    help_replay: "도움말 다시 보기"
    notifications: "알림"
    notifications_mark_all_read: "모두 읽음"
    notifications_view_all: "전체 알림 보기"
    sign_out: "로그아웃"
    sign_in: "로그인"
    sign_up: "회원가입"

  # ──────────────────────────────────────────────────
  # 공통 UI
  # ──────────────────────────────────────────────────
  common:
    confirm: "확인"
    cancel: "취소"
    save: "저장"
    edit: "수정"
    delete: "삭제"
    close: "닫기"
    back: "뒤로"
    loading: "불러오는 중..."
    none: "없음"
    all: "전체"
    # YAML bare `yes`/`no` 는 boolean으로 파싱되므로 quote해 string key로 고정.
    "yes": "예"
    "no": "아니요"
    optional: "선택"
    required: "필수"

  # ──────────────────────────────────────────────────
  # CTA 사전 (synthesis 8.1)
  # ──────────────────────────────────────────────────
  cta:
    record: "기록하기"
    commit_review: "거래 내역 반영"
    review_now: "지금 검토"
    paste_sms: "문자 붙여넣기"
    upload_shot: "스크린샷 올리기"
    add_manual: "직접 입력하기"
    cancel_review: "검토 취소"
    adjust_budget: "예산 조정"

  # ──────────────────────────────────────────────────
  # 라이브 컨텍스트 (synthesis 8.2)
  # ──────────────────────────────────────────────────
  live:
    month_pace: "지난달 같은 시점 대비 %{delta}%"
    expected_end: "예상 마감 약 %{amount}원"
    review_pending: "검토 대기 %{count}건"
    duplicate_pending: "중복 후보 %{count}건"

  # ──────────────────────────────────────────────────
  # 빈 상태 (synthesis 8.3)
  # ──────────────────────────────────────────────────
  empty:
    no_tx: "%{workspace}에 아직 기록된 거래가 없어요"
    no_review: "검토할 거래가 없어요. 모두 반영됐어요."
    no_category: "%{workspace}의 첫 카테고리를 만들어 볼까요?"

  # ──────────────────────────────────────────────────
  # AI 라벨링 (synthesis 8.4)
  # ──────────────────────────────────────────────────
  ai:
    suggested: "AI가 추천했어요"
    low_confidence: "추천이 확실하지 않아요 — 한 번 더 확인해 주세요"
    source_gemini: "Gemini 추천"

  # ──────────────────────────────────────────────────
  # 위험 행동 — X11 의도적 마찰 (synthesis 8.5)
  # ──────────────────────────────────────────────────
  risk:
    commit_locked: "중복 %{count}건을 먼저 정리해야 반영할 수 있어요"
    workspace_leave: "떠나면 %{workspace}의 거래를 더 이상 볼 수 없어요. 다른 멤버에게는 영향이 없어요."
    workspace_delete: "삭제하면 거래 %{count}건이 모두 사라져요. 되돌릴 수 없어요."
    bulk_delete: "거래 %{count}건을 삭제할게요. 되돌릴 수 없어요."
    rollback_session: "이 세션의 거래 %{count}건이 모두 검토 전 상태로 돌아가요."

  # ──────────────────────────────────────────────────
  # 학습 알림 — 인라인 (synthesis 8.6)
  # ──────────────────────────────────────────────────
  learn:
    suggest_mapping: "다음 같은 가맹점부터는 이 카테고리로 자동 분류할까요?"
    applied: "학습됐어요. 같은 가맹점부터는 자동으로 분류돼요."

  # ──────────────────────────────────────────────────
  # 대시보드 (Phase 6-2)
  # ──────────────────────────────────────────────────
  dashboards:
    title: "대시보드"
    workspace_year_month: "%{workspace} - %{year}년 %{month}월"
    workspace_year: "%{workspace} - %{year}년"
    year_month: "%{year}년 %{month}월"
    tabs:
      calendar: "캘린더"
      monthly: "월별"
      yearly: "연도별"
      recurring: "반복 결제"
    month_label: "%{month}월"
    monthly:
      prev_month: "← 이전 달"
      next_month: "다음 달 →"
      hero_label: "%{year}년 %{month}월 총 지출"
      supporting_count: "%{count}건 결제"
      supporting_daily_avg: "일 평균 %{amount}"
      supporting_budget_progress: "예산 대비 %{percentage}% (%{budget})"
      breakdown_title: "카테고리별 지출"
      breakdown_hint: "카테고리를 클릭하면 해당 결제를 볼 수 있습니다"
      manage_categories: "카테고리 관리"
    yearly:
      prev_year: "← 이전 연도"
      next_year: "다음 연도 →"
      annual_total: "연간 총 지출"
      monthly_avg: "월 평균 지출"
      highest_month: "최고 지출 월"
      lowest_month: "최저 지출 월"
      monthly_category_title: "월별 카테고리 지출"
      integrated_view: "통합 보기"
      trend_view: "추세 보기"
      legend_hint: "범례를 클릭하여 카테고리를 숨기거나 표시할 수 있습니다"
      empty: "해당 연도의 결제 내역이 없습니다."
      category_annual_title: "카테고리별 연간 지출"
    calendar:
      header: "%{year}년 %{month}월 지출"
      needs_review_count: "검토 필요 %{count}건"
      needs_review_zero: "검토 필요 0건"
      duplicate_count: "중복 의심 %{count}건"
      duplicate_zero: "중복 의심 0건"
      uncategorized_count: "미분류 %{count}건"
      uncategorized_zero: "미분류 0건"
      badge_review: "검토 %{count}"
      badge_duplicate: "중복 %{count}"
      badge_uncategorized: "미분류 %{count}"
      no_transactions_for_date: "선택한 날짜에는 결제가 없습니다."
      no_merchant: "내역 없음"
      uncategorized_label: "미분류"
      monthly_view_link: "월간 보기 →"
      sum: "합계 %{amount}"
      no_transactions: "결제 내역이 없습니다."
    weekdays:
      sun: "일"
      mon: "월"
      tue: "화"
      wed: "수"
      thu: "목"
      fri: "금"
      sat: "토"
    recurring:
      title: "반복 결제"
      subtitle: "2개월 이상 동일 상점에서 결제된 항목을 자동으로 감지합니다."
      detected_count: "%{count}개 반복 결제 감지됨"
      monthly_expected: "월 예상 합계: %{amount}"
      fixed_amount: "정액"
      variable_amount: "변동"
      occurrence_summary: "%{count}개월 연속 · 마지막 결제 %{date}"
      per_month: "%{amount}/월"
      total: "총 %{amount}"
      empty_title: "반복 결제가 감지되지 않았습니다."
      empty_hint: "2개월 이상의 결제 데이터가 쌓이면 자동으로 감지됩니다."
    category_breakdown_empty: "결제 내역이 없습니다."
    category_transactions_panel:
      title_html: "%{category} 결제"
      view_all: "전체 보기 →"
      close: "선택 해제"
      empty: "이 카테고리에 결제 내역이 없습니다."
    recent_transactions:
      title: "최근 결제"
      view_all: "전체 보기 →"
      empty: "최근 결제 내역이 없습니다."

  # ──────────────────────────────────────────────────
  # ADR-0011 — Transaction 결정 메커니즘 / Mapping 출처
  # 결정 메커니즘(transactions.classification_source)과 매핑 출처(category_mappings.source)는
  # 어휘를 공유하지 않는다 — "학습 매핑" vs "직접 등록" 등 분리.
  # ──────────────────────────────────────────────────
  transactions:
    category_learning_suggestion:
      body: "다음 같은 가맹점부터는 이 카테고리로 자동 분류할까요?"
      accept: "예, 자동 분류"
      dismiss: "아니요, 이번만 변경"
    # ADR-0011: 결정 메커니즘 4값의 사용자 라벨. 순서는 ADR-0007 §1.1(1→2→3→수동).
    # manual_set은 chip 마크 없음 (사용자 직접 지정).
    classification_source:
      mapping_match: "학습 매핑"
      keyword_match: "키워드"
      gemini_batch: "AI 추천"
      manual_set: ""

  category_mappings:
    source:
      manual: "직접 등록"
      import: "가져온 매핑"
      gemini: "AI 학습 매핑"
