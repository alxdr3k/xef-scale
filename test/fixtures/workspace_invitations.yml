# Test workspace invitations

active_invitation:
  workspace: main_workspace
  invited_by: admin
  token: <%= SecureRandom.urlsafe_base64(32) %>
  expires_at: <%= 7.days.from_now %>
  max_uses: 10
  current_uses: 2

expired_invitation:
  workspace: main_workspace
  invited_by: admin
  token: <%= SecureRandom.urlsafe_base64(32) %>
  expires_at: <%= 1.day.ago %>
  max_uses: 5
  current_uses: 1

used_up_invitation:
  workspace: main_workspace
  invited_by: admin
  token: <%= SecureRandom.urlsafe_base64(32) %>
  expires_at: <%= 7.days.from_now %>
  max_uses: 3
  current_uses: 3

unlimited_invitation:
  workspace: main_workspace
  invited_by: admin
  token: <%= SecureRandom.urlsafe_base64(32) %>
  expires_at:
  max_uses:
  current_uses: 5
