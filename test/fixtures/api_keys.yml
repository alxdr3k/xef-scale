# Test API keys

active_key:
  workspace: main_workspace
  name: Test API Key
  key_digest: <%= OpenSSL::HMAC.hexdigest("SHA256", Rails.application.secret_key_base, "xef_test_key_active_123456789012") %>
  key_prefix: xef_test
  last_used_at: nil
  revoked_at: nil

revoked_key:
  workspace: main_workspace
  name: Revoked Key
  key_digest: <%= OpenSSL::HMAC.hexdigest("SHA256", Rails.application.secret_key_base, "xef_test_key_revoked_12345678901") %>
  key_prefix: xef_test
  revoked_at: <%= 1.day.ago %>
